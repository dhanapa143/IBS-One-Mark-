<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IBS Smart Quiz</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#0ea5e9,#9333ea);
    background-size:400% 400%;
    animation:bgMove 10s infinite alternate;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    100%{background-position:100% 50%;}
}

.app{width:100%;max-width:800px;}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(20px);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 40px rgba(0,0,0,0.6);
    text-align:center;
}

h1{margin-bottom:20px;}

button{
    padding:12px 18px;
    margin:10px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    background:linear-gradient(135deg,#38bdf8,#22c55e);
    transition:0.3s;
}

button:hover{transform:scale(1.05);}

.option{
    background:rgba(255,255,255,0.1);
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{background:rgba(255,255,255,0.2);}

.correct{background:#22c55e !important;}
.wrong{background:#ef4444 !important;}

.progress{height:8px;background:#334155;border-radius:10px;margin:10px 0;}
#progressBar{height:100%;width:0%;background:#38bdf8;}

.hidden{display:none;}
</style>

</head>

<body>

<div class="app">

<h1>🚀 IBS Smart Quiz</h1>

<div class="card" id="unitBox">
<h2>Select Unit</h2>
<button onclick="startQuiz('unit1')">Unit 1</button>
<button onclick="startQuiz('unit4')">Unit 4</button>
<button onclick="startQuiz('unit5')">Unit 5</button>
</div>

<div class="card hidden" id="quizBox">
<div id="progressText"></div>
<div class="progress"><div id="progressBar"></div></div>
<h2 id="question"></h2>
<div id="options"></div>
<button id="nextBtn" onclick="nextQuestion()">Next</button>
</div>

<div class="card hidden" id="resultBox">
<h2>🎉 Quiz Completed!</h2>
<h3 id="finalScore"></h3>
<button onclick="location.reload()">Restart</button>
</div>

</div>

// ===== LOGIC =====
let current=[],index=0,score=0;

function startQuiz(unit){
    current=quizData[unit];
    index=0;score=0;
    unitBox.classList.add("hidden");
    quizBox.classList.remove("hidden");
    loadQuestion();
}

function loadQuestion(){
    let q=current[index];
    question.innerText=q.q;
    progressText.innerText=`Question ${index+1}/${current.length}`;
    progressBar.style.width=((index)/current.length)*100+"%";

    options.innerHTML="";
    q.o.forEach((opt,i)=>{
        let div=document.createElement("div");
        div.className="option";
        div.innerText=opt;
        div.onclick=()=>checkAnswer(i);
        options.appendChild(div);
    });

    nextBtn.style.display="none";
}

function checkAnswer(i){
    let correct=current[index].a;
    let opts=document.getElementsByClassName("option");

    for(let j=0;j<opts.length;j++){
        if(j===correct) opts[j].classList.add("correct");
        else if(j===i) opts[j].classList.add("wrong");
        opts[j].onclick=null;
    }

    if(i===correct) score++;
    nextBtn.style.display="block";
}

function nextQuestion(){
    index++;
    if(index<current.length) loadQuestion();
    else{
        quizBox.classList.add("hidden");
        resultBox.classList.remove("hidden");
        finalScore.innerText=`Score: ${score}/${current.length}`;
    }
}

</script>

</body>
</html>
